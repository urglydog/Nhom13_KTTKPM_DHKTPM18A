services:
  payment-service:
    build:
      context: ..
      dockerfile: ./Payment-Service/Dockerfile
    container_name: payment-service
    ports:
      - "${PAYMENT_SERVICE_PORT:-8088}:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - EUREKA_CLIENT_ENABLED=${EUREKA_CLIENT_ENABLED:-false}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=${EUREKA_DEFAULT_ZONE:-http://eureka-server:8761/eureka/}
      - PAYMENT_DB_JDBC_URL=jdbc:postgresql://${PAYMENT_DB_HOST:-payment-db}:5432/${PAYMENT_DB_NAME:-payment_db}
      - PAYMENT_DB_USER=${PAYMENT_DB_USER:-postgres}
      - PAYMENT_DB_PASSWORD=${PAYMENT_DB_PASSWORD:-payment123}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST:-redis}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - MOMO_PARTNER_CODE=${MOMO_PARTNER_CODE:-MOMOLRJZ20181206}
      - MOMO_ACCESS_KEY=${MOMO_ACCESS_KEY:-MTCKt9W3eU1m39TW}
      - MOMO_SECRET_KEY=${MOMO_SECRET_KEY:-SetA5RDnLHvt51AULf51DyauxUo3kDU6}
      - MOMO_NOTIFY_URL=${MOMO_NOTIFY_URL:-http://localhost:${PAYMENT_SERVICE_PORT:-8088}/api/payments/momo/ipn}
      - MOMO_RETURN_URL=${MOMO_RETURN_URL:-http://localhost:3000/payment-result}
    volumes:
      - maven-cache:/root/.m2
    networks:
      - cab-network
    depends_on:
      payment-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8088/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: on-failure

  payment-db:
    image: postgres:16-alpine
    container_name: payment-db
    environment:
      - POSTGRES_DB=${PAYMENT_DB_NAME:-payment_db}
      - POSTGRES_USER=${PAYMENT_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${PAYMENT_DB_PASSWORD:-payment123}
    ports:
      - "${PAYMENT_DB_PORT:-5435}:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    networks:
      - cab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER:-postgres} -d ${PAYMENT_DB_NAME:-payment_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  maven-cache:
    driver: local
  payment-db-data:
    driver: local

networks:
  cab-network:
    driver: bridge
    name: cab-network
