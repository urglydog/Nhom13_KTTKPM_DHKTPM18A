services:
  payment-db:
    image: postgres:16-alpine
    container_name: payment-db
    environment:
      - POSTGRES_DB=${PAYMENT_DB_NAME}
      - POSTGRES_USER=${PAYMENT_DB_USER}
      - POSTGRES_PASSWORD=${PAYMENT_DB_PASSWORD}
    ports:
      - "5435:5432"
    networks:
      - cab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PAYMENT_DB_USER} -d ${PAYMENT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: payment-service
    ports:
      - "${PAYMENT_SERVICE_PORT}:8088"
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - EUREKA_CLIENT_ENABLED=false
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_DEFAULT_ZONE}
      - PAYMENT_DB_JDBC_URL=jdbc:postgresql://payment-db:5432/${PAYMENT_DB_NAME}
      - PAYMENT_DB_USER=${PAYMENT_DB_USER}
      - PAYMENT_DB_PASSWORD=${PAYMENT_DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${REDIS_PORT}
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
    volumes:
      - maven-cache:/root/.m2
    networks:
      - cab-network
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  maven-cache:
    driver: local

networks:
  cab-network:
    driver: bridge
