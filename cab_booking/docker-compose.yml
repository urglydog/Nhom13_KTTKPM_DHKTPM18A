name: cab-booking-system

include:
  - config-server/docker-compose.yaml
  - eureka/docker-compose.yaml
  - api-gateway/docker-compose.yaml
  - auth-service/docker-compose.yaml
  - email-service/docker-compose.yaml
  - user-service/docker-compose.yaml
  - notification-service/docker-compose.yaml
  - review-service/docker-compose.yaml
  - Pricing-Service/docker-compose.yaml
  - Payment-Service/docker-compose.yaml

services:
  redis:
    image: redis:7-alpine
    container_name: cab-redis
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    networks:
      - cab-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - cab-network
    volumes:
      - mongo-data:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/commands/stat | grep server_state || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - cab-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s
    restart: on-failure
    networks:
      - cab-network

volumes:
  maven-cache:
    driver: local
  mongo-data:
    driver: local

networks:
  cab-network:
    driver: bridge
