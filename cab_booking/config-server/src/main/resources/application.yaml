server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations: 
            - file:${user.dir}/cab_booking/cab-booking-config/
            - file:${user.dir}/cab-booking-config/
            - file:./../cab-booking-config/
            - file:./cab-booking-config/

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health