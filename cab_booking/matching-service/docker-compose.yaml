version: '3.8'

services:
  matching-service:
    build:
      context: . # Trỏ tới thư mục chứa Dockerfile
      dockerfile: Dockerfile
    container_name: cab-matching-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      # Ghi đè các biến trong application.yaml
      - KAFKA_URL=kafka:29092     # Trỏ tới tên service kafka trong mạng Docker
      - REDIS_HOST=redis          # Trỏ tới tên service redis trong mạng Docker
      - REDIS_PORT=6379
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      - kafka
      - redis
    networks:
      - cab-network

  # --- CÁC SERVICE PHỤ THUỘC DƯỚI ĐÂY (NẾU CHƯA CÓ THÌ THÊM VÀO) ---
  redis:
    image: redis:7.2-alpine
    container_name: cab-redis
    ports:
      - "6379:6379"
    networks:
      - cab-network

  kafka:
    image: bitnami/kafka:3.5
    container_name: cab-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:29092,CONTROLLER://:29093,EXTERNAL://:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:29093
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    networks:
      - cab-network

networks:
  cab-network:
    driver: bridge
