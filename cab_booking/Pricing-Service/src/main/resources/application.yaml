server:
  port: 8084

spring:
  application:
    name: pricing-service

  data:
    mongodb:
      uri: mongodb://mongodb:27017/pricing_db
      auto-index-creation: true

    redis:
      host: cab-redis
      port: 6379
      password: redis123
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka
    fetch-registry: true
    register-with-eureka: true
    instance-info-replication-interval-seconds: 10
    registry-fetch-interval-seconds: 10
  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  security:
    public-endpoints: /actuator/**,/swagger-ui/**,/api-docs/**,/swagger-ui.html

services:
  eta:
    url: ${ETA_SERVICE_URL:http://eta-service:8088}
    estimate-path: ${ETA_ESTIMATE_PATH:/internal/eta/estimate}

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    mongo:
      enabled: true
    redis:
      enabled: true
    circuitbreakers:
      enabled: true

resilience4j:
  circuitbreaker:
    instances:
      mapbox:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      openMeteo:
        sliding-window-size: 20
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  timelimiter:
    instances:
      mapbox:
        timeout-duration: 3s
      openMeteo:
        timeout-duration: 3s
  retry:
    instances:
      mapbox:
        max-attempts: 2
        wait-duration: 200ms
      openMeteo:
        max-attempts: 2
        wait-duration: 200ms
  ratelimiter:
    instances:
      mapbox:
        limit-for-period: 50
        limit-refresh-period: 1s
        timeout-duration: 0s
      openMeteo:
        limit-for-period: 50
        limit-refresh-period: 1s
        timeout-duration: 0s

logging:
  level:
    root: INFO
    iuh.fit.pricing_service: DEBUG
    org.springframework.data.mongodb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

pricing:
  calculation:
    base-fare: 12000
    per-km-rate: 8500
    per-minute-rate: 1200
    minimum-fare: 25000
    platform-fee: 2000
    airport-fee: 0
    toll-fee: 0
    currency: VND
    config-version: v1
  vehicle:
    economy:
      multiplier: 1.0
      base-fare: 12000
      per-km: 8500
      per-minute: 1200
    comfort:
      multiplier: 1.5
      base-fare: 18000
      per-km: 12000
      per-minute: 1600
    premium:
      multiplier: 2.0
      base-fare: 30000
      per-km: 18000
      per-minute: 2500
  surge:
    default-multiplier: 1.0
    min-multiplier: 1.0
    max-multiplier: 3.0
    update-threshold: 0.1
    cache-ttl-seconds: 300
    metrics-ttl-seconds: 600
    scheduler-fixed-delay-ms: 60000
    high-demand-ratio: 1.5
    very-high-demand-ratio: 3.0
    high-demand-adjustment: 0.2
    very-high-demand-adjustment: 0.5
    rush-hour-adjustment: 0.2
    night-adjustment: 0.1
    manual-adjustment: 0.0
  weather:
    bad-weather-adjustment: 0.2
  cache:
    weather-ttl-seconds: 1800
    route-ttl-seconds: 300
  estimate:
    expiry-scheduler-fixed-delay-ms: 60000
  eta:
    fallback-duration-minutes: 15

mapbox:
  api-key: ${MAPBOX_API_KEY:dummy_mapbox_key}

feign:
  client:
    config:
      mapboxClient:
        connectTimeout: 2000
        readTimeout: 3000
      openMeteoClient:
        connectTimeout: 2000
        readTimeout: 3000
