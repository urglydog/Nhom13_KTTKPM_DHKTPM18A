services:
  eureka-server:
    build: .
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888
      - SPRING_APPLICATION_NAME=eureka-server
    volumes:
      - maven-cache:/root/.m2
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8761/eureka/apps || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: on-failure:5
    networks:
      - cab-network
    depends_on:
      config-server:
        condition: service_healthy

volumes:
  maven-cache:
    driver: local
