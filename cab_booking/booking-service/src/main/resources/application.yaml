server:
  port: 8081

spring:
  application:
    name: booking-service
  
  # Cấu hình Database
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/cab_booking}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false # Tắt log SQL để dễ nhìn log Kafka/Redis hơn
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Cấu hình Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # Cấu hình chuẩn cho KAFKA
  kafka:
    bootstrap-servers: ${KAFKA_URL:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # BOOKING PHÁT RA CÁC SỰ KIỆN LIÊN QUAN ĐẾN ĐƠN ĐẶT (Đã xóa ride-assigned khỏi đây)
        spring.json.type.mapping: >
          booking-created:com.cab.booking.core.dto.event.outbound.RideCreatedEvent,
          ride-created:com.cab.booking.core.dto.event.outbound.RideCreatedEvent,
          ride-cancelled:com.cab.booking.core.dto.event.outbound.RideCancelledEvent,
          booking-timeout:com.cab.booking.core.dto.event.outbound.BookingTimeoutEvent
    consumer:
      group-id: booking-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        # BOOKING NHẬN VỀ CÁC SỰ KIỆN TỪ MATCHING, RIDE, VÀ PAYMENT
        # Đã gom driver-matched thành ride-assigned và thêm đủ dấu phẩy
        spring.json.type.mapping: >
          driver-assigned:com.cab.booking.core.dto.event.inbound.RideAssignedEvent,
          ride-assigned:com.cab.booking.core.dto.event.inbound.RideAssignedEvent,
          com.cab.matching.core.dto.event.outbound.RideAssignedEvent:com.cab.booking.core.dto.event.inbound.RideAssignedEvent,
          driver-accepted:com.cab.booking.core.dto.event.inbound.DriverAcceptedEvent,
          driver-rejected:com.cab.booking.core.dto.event.inbound.DriverRejectedEvent,
          ride-arrived:com.cab.booking.core.dto.event.inbound.RideArrivedEvent,
          ride-started:com.cab.booking.core.dto.event.inbound.RideStartedEvent,
          ride-completed:com.cab.booking.core.dto.event.inbound.RideCompletedEvent,
          payment-completed:com.cab.booking.core.dto.event.inbound.PaymentCompletedEvent,
          payment-failed:com.cab.booking.core.dto.event.inbound.PaymentFailedEvent,
          driver-status:com.cab.booking.core.dto.event.inbound.DriverStatusEvent

# Cấu hình Eureka Client
eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

resilience4j:
  retry:
    instances:
      driverService:
        max-attempts: 3
        wait-duration: 3s

# Cấu hình bảo mật — đọc bởi iuh.fit.common.config.SecurityConfig
# JWT được decode bằng RSA public key (từ certs/ hoặc biến môi trường JWT_PRIVATE_KEY)
app:
  security:
    # Các endpoint không cần xác thực JWT (phân cách bằng dấu phẩy)
    public-endpoints: >-
      /actuator/health,
      /actuator/info,
      /v3/api-docs/**,
      /swagger-ui/**,
      /swagger-ui.html,
      /api/v1/bookings,
      /api/v1/bookings/ping,
      /api/v1/bookings/demo/**

# ==========================================================
# CẤU HÌNH DISTRIBUTED TRACING (ZIPKIN & MICROMETER)
# ==========================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0 # 1.0 = Bắt 100% traces (Tốt cho dev, lúc lên Production nên giảm xuống 0.1)
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

# ==========================================================
# CẤU HÌNH SWAGGER (OPENAPI 3)
# ==========================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
logging:
  level:
    org.springframework.security: TRACE
    org.springframework.security.oauth2: TRACE
    org.springframework.kafka: INFO
    org.apache.kafka.clients.consumer: INFO
