server:
  port: 8085

spring:
  application:
    name: ride-service

  # ── Database ──────────────────────────────────────────────────────────────
  datasource:
    url: ${POSTGRES_URL:${RIDE_DB_JDBC_URL:jdbc:postgresql://ride-db:5432/ride_db}}
    username: ${POSTGRES_USER:${RIDE_DB_USER:postgres}}
    password: ${POSTGRES_PASSWORD:${RIDE_DB_PASSWORD:password}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Redis ──────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_URL:${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: >
          ride-arrived:com.cab.ride.core.dto.event.outbound.RideArrivedEvent,
          ride-started:com.cab.ride.core.dto.event.outbound.RideStartedEvent,
          ride-completed:com.cab.ride.core.dto.event.outbound.RideCompletedEvent
    consumer:
      group-id: ride-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: >
          ride-assigned:com.cab.ride.core.dto.event.inbound.RideAssignedEvent,
          ride-created:com.cab.ride.core.dto.event.inbound.RideCreatedEvent,
          ride-accepted:com.cab.ride.core.dto.event.inbound.DriverAcceptedEvent,
          driver-location:com.cab.ride.core.dto.event.DriverLocationEvent

# ── Eureka ──────────────────────────────────────────────────────────────────
eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL:${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# ── Security (RSA JWT từ common module) ────────────────────────────────────
app:
  security:
    public-endpoints: >-
      /actuator/health,
      /actuator/info,
      /v3/api-docs/**,
      /swagger-ui/**,
      /swagger-ui.html,
      /api/v1/rides/location,
      /api/v1/rides/ping

# ── Distributed Tracing ─────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

# ── Swagger ─────────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

logging:
  level:
    com.cab.ride: DEBUG
    org.springframework.kafka: INFO
    org.springframework.data.redis: INFO
